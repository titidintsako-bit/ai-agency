# ============================================================
# config/clients/smilecare.yaml
#
# SmileCare Dental — Sandton, Johannesburg
# Agent: Lerato (virtual receptionist)
# ============================================================

client:
  slug: smilecare
  name: SmileCare Dental
  industry: dental
  tier: professional
  contact_email: hello@smilecare.co.za
  monthly_retainer_zar: 5500.00

# ------------------------------------------------------------
# Agent name — used in the system prompt
# ------------------------------------------------------------
agent_name: Lerato

# ------------------------------------------------------------
# Agent channels
# ------------------------------------------------------------
agents:
  web_chat:
    name: SmileCare Web Chat
    channel: web
    model: claude-haiku-4-5-20251001

  whatsapp:
    name: SmileCare WhatsApp
    channel: whatsapp
    model: claude-haiku-4-5-20251001

# ------------------------------------------------------------
# Clinic information
# ------------------------------------------------------------
clinic_info:
  address: "Shop 14, Sandton City Medical Suites, Sandton, 2196"
  branch_rosebank: "Rosebank (satellite branch)"
  phone: "011 234 5678"
  whatsapp: "+27 82 555 0123"
  email: "hello@smilecare.co.za"
  website: "https://smilecare.co.za"

  hours:
    monday:    "07:00 - 18:00"
    tuesday:   "07:00 - 18:00"
    wednesday: "07:00 - 18:00"
    thursday:  "07:00 - 18:00"
    friday:    "07:00 - 18:00"
    saturday:  "08:00 - 14:00"
    sunday:    "Closed"
    public_holidays: "Closed"

  emergency_contact: "011 234 5678"
  after_hours_message: >
    We are currently closed. Your message has been logged and a member of our
    team will contact you during business hours. For dental emergencies,
    please call 011 234 5678.

# ------------------------------------------------------------
# Team
# ------------------------------------------------------------
dentists:
  - name: "Dr Sipho Dlamini"
    role: "Principal Dentist"
  - name: "Dr Amina Patel"
    role: "General & Cosmetic Dentist"
  - name: "Dr Gareth Williams"
    role: "Orthodontist"
  - name: "Dr Naledi Mokoena"
    role: "General Dentist"

# ------------------------------------------------------------
# Medical aids accepted
# ------------------------------------------------------------
medical_aids:
  - Discovery Health
  - Momentum
  - Bonitas
  - Medihelp
  - Bestmed

# ------------------------------------------------------------
# Services and pricing
# ------------------------------------------------------------
services:
  - name: Consultation
    price_zar: 350
    price_display: "R350"
    duration_minutes: 30
    description: "Initial visit and oral assessment."

  - name: Scale & Polish (Cleaning)
    price_zar: 550
    price_display: "R450 – R650"
    duration_minutes: 45
    description: "Professional scale and polish. Price depends on complexity."

  - name: Teeth Whitening
    price_zar: 2800
    price_display: "from R2,800"
    duration_minutes: 60
    description: "In-chair professional whitening treatment."

  - name: Braces / Orthodontics
    price_zar: 18000
    price_display: "from R18,000"
    duration_minutes: 45
    description: "Full orthodontic treatment — traditional braces or clear aligners."

  - name: Dental Implants
    price_zar: 22000
    price_display: "from R22,000"
    duration_minutes: 60
    description: "Permanent tooth replacement. Price is per implant."

  - name: Kids Dentistry
    price_zar: 280
    price_display: "from R280"
    duration_minutes: 30
    description: "Child-friendly dental care for patients under 12."

  - name: Emergency Appointment
    price_zar: 1500
    price_display: "R1,500"
    duration_minutes: 45
    description: "Same-day emergency slot for pain, trauma, or urgent issues."

# ------------------------------------------------------------
# Appointment booking
# ------------------------------------------------------------
appointment_booking:
  required_fields:
    - patient_name
    - contact_number
    - preferred_date
    - preferred_time
    - service_type

  optional_fields:
    - is_existing_patient
    - additional_notes

  confirmation_message: >
    Thank you! Your appointment request has been logged. A member of our team
    will call you within 2 hours during business hours to confirm your slot.
    If you need to reach us directly, call 011 234 5678.

# ------------------------------------------------------------
# Escalation triggers
# ------------------------------------------------------------
escalation:
  triggers:
    - complaint
    - emergency
    - explicit_request
    - billing_dispute
    - abuse

  auto_response: >
    I understand this requires immediate attention. I have flagged your message
    for one of our team members who will contact you as soon as possible.
    For urgent matters, please call 011 234 5678 directly.
